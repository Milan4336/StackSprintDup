version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: fraud-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fraud-net

  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fraud-net

  ml-service:
    build: ./ml-service
    container_name: fraud-ml-service
    ports:
      - "8000:8000"
    networks:
      - fraud-net

  api-gateway:
    build: ./api-gateway
    container_name: fraud-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/fraud
      - REDIS_URI=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=supersecretminimum32charactersforjwt
      - JWT_EXPIRES_IN=1h
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-}
      - SECRET_PROVIDER=${SECRET_PROVIDER:-env}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX_HOST=${PINECONE_INDEX_HOST:-}
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-fraud-copilot}
      - MFA_TOTP_ISSUER=${MFA_TOTP_ISSUER:-Stack Sprint Fraud Command Center}
      - LOCKDOWN_THREAT_THRESHOLD=${LOCKDOWN_THREAT_THRESHOLD:-90}
      - LOKI_PUSH_URL=${LOKI_PUSH_URL:-}
      - LOKI_LABELS=${LOKI_LABELS:-service=api-gateway,stack=stack-sprint}
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - DOCKER_CONTAINERS=${DOCKER_CONTAINERS:-fraud-api-gateway,fraud-ml-service,fraud-mongo,fraud-redis}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-120}
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-20}
      - RATE_LIMIT_LOGIN_MAX=${RATE_LIMIT_LOGIN_MAX:-8}
    volumes:
      - ./PATCH_NOTES.md:/app/PATCH_NOTES.md
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - mongo
      - redis
      - ml-service
    networks:
      - fraud-net

  frontend:
    build: ./frontend
    container_name: fraud-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - fraud-net

networks:
  fraud-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
